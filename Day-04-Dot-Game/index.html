<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light / Dark Mode</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Celsius to Fahrenheit Converter</h1>

    <input type="number" id="celsius" placeholder="Enter Celsius">

    <p>Fahrenheit: <span id="fahrenheit">32</span>°F</p>
    <hr>
    <h1>Digital Clock</h1>

    <h2 id="clock">00:00:00</h2><hr>

    <h1>Light / Dark Mode Switch</h1>

    <p>Click the button below to switch between themes.</p>

    <button id="themeBtn">Toggle Theme</button>

    <script src="script.js"></script>
  </body>
</html>
